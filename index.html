<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English ↔ Italian Translator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e9eef3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .translator-box {
      width: 90%;
      max-width: 900px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
    }

    .panel {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      color: #333;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .controls {
      background: #f7f9fb;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      padding: 12px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 140px;
    }

    button:hover {
      background: #1664c4;
    }
  </style>
</head>
<body>

  <div class="translator-box">

    <!-- Left Panel -->
    <div class="panel">
      <h2>Input</h2>
      <textarea id="inputText" placeholder="Type text here..."></textarea>
    </div>

    <!-- Middle Controls -->
    <div class="controls">
      <select id="direction">
        <option value="en-it">English → Italian</option>
        <option value="it-en">Italian → English</option>
      </select>

      <button onclick="translateText()">Translate</button>
    </div>

    <!-- Right Panel -->
    <div class="panel">
      <h2>Output</h2>
      <textarea id="outputText" readonly></textarea>
    </div>

  </div>

  <script>
    async function translateText() {
      const text = document.getElementById("inputText").value.trim();
      const direction = document.getElementById("direction").value;
      const [source, target] = direction.split("-");

      if (!text) {
        document.getElementById("outputText").value = "";
        return;
      }

      document.getElementById("outputText").value = "Translating...";

      try {
        const response = await fetch("https://libretranslate.com/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            q: text,
            source: source,
            target: target,
            format: "text"
          })
        });

        const data = await response.json();
        document.getElementById("outputText").value = data.translatedText;

      } catch (error) {
        document.getElementById("outputText").value =
          "Error: Could not reach translation server.";
      }
    }
  </script>

</body>
</html>
