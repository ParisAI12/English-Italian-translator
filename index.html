<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>English ↔ Italian Translator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      margin-top: 40px;
      padding: 24px 28px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 100%;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
      text-align: center;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
      padding: 8px 10px;
      margin-bottom: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }
    select:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      background: #2563eb;
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #1d4ed8;
    }
    .output {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      min-height: 60px;
      white-space: pre-wrap;
    }
    .note {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>English ↔ Italian Translator</h1>

    <label for="direction">Direction</label>
    <select id="direction">
      <option value="en-it">English → Italian</option>
      <option value="it-en">Italian → English</option>
    </select>

    <label for="inputText">Text</label>
    <textarea id="inputText" placeholder="Type your sentence here..."></textarea>

    <button id="translateBtn">Translate</button>

    <label>Translation</label>
    <div id="output" class="output"></div>

    <div class="note">
      Note: This demo uses a small built-in dictionary. Unknown words are shown in [brackets].
    </div>
  </div>

  <script>
    const EN_TO_IT = {
      "hello": "ciao",
      "goodbye": "addio",
      "please": "per favore",
      "thank": "grazie",
      "thanks": "grazie",
      "you": "tu",
      "thank you": "grazie",
      "yes": "sì",
      "no": "no",
      "cat": "gatto",
      "dog": "cane",
      "food": "cibo",
      "water": "acqua",
      "good": "buono",
      "morning": "mattina",
      "night": "notte",
      "friend": "amico"
    };

    const IT_TO_EN = {};
    for (const [en, it] of Object.entries(EN_TO_IT)) {
      IT_TO_EN[it] = en;
    }

    function translate(text, direction) {
      const dict = direction === "en-it" ? EN_TO_IT : IT_TO_EN;
      const words = text.toLowerCase().split(/\s+/).filter(Boolean);

      // Try phrase-level (e.g., "thank you") first
      const joined = words.join(" ");
      if (dict[joined]) {
        return dict[joined];
      }

      const translatedWords = words.map(w => dict[w] || `[${w}]`);
      return translatedWords.join(" ");
    }

    document.getElementById("translateBtn").addEventListener("click", () => {
      const direction = document.getElementById("direction").value;
      const inputText = document.getElementById("inputText").value.trim();

      if (!inputText) {
        document.getElementById("output").textContent = "";
        return;
      }

      const result = translate(inputText, direction);
      document.getElementById("output").textContent = result;
    });
  </script>
</body>
</html>
