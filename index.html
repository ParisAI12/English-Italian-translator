<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Translator Utility v1.3</title>

  <style>
    body {
      background: #c0c0c0;
      font-family: "Times New Roman", serif;
      margin: 0;
      padding: 20px;
    }

    .window {
      background: #e0e0e0;
      border: 3px solid #808080;
      width: 750px;
      margin: 0 auto;
      padding: 10px;
      box-shadow: inset 2px 2px 0 #ffffff, inset -2px -2px 0 #404040;
    }

    .titlebar {
      background: #000080;
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-spacing: 5px;
    }

    textarea {
      width: 100%;
      height: 180px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      border: 2px solid #808080;
      background: #ffffff;
      padding: 5px;
      resize: none;
      box-shadow: inset 2px 2px 0 #ffffff, inset -2px -2px 0 #404040;
    }

    select {
      width: 100%;
      padding: 4px;
      font-family: "Times New Roman", serif;
      border: 2px solid #808080;
      background: #ffffff;
      box-shadow: inset 2px 2px 0 #ffffff, inset -2px -2px 0 #404040;
    }

    .button {
      padding: 6px 12px;
      background: #d0d0d0;
      border: 2px solid #808080;
      font-family: "Times New Roman", serif;
      cursor: pointer;
      box-shadow: inset 2px 2px 0 #ffffff, inset -2px -2px 0 #404040;
    }

    .button:active {
      box-shadow: inset -2px -2px 0 #ffffff, inset 2px 2px 0 #404040;
    }
  </style>
</head>

<body>

  <div class="window">
    <div class="titlebar">Translator Utility v1.3 — ©1998 Linguasoft</div>

    <table>
      <tr>
        <td><b>Input Text</b></td>
        <td><b>Output Text</b></td>
      </tr>

      <tr>
        <td><textarea id="inputText"></textarea></td>
        <td><textarea id="outputText" readonly></textarea></td>
      </tr>

      <tr>
        <td>
          <select id="direction">
            <option value="en-it">English → Italian</option>
            <option value="it-en">Italian → English</option>
          </select>
        </td>

        <td>
          <button class="button" onclick="translateText()">Translate</button>
        </td>
      </tr>
    </table>
  </div>

  <script>
    async function translateText() {
      const text = document.getElementById("inputText").value.trim();
      const direction = document.getElementById("direction").value;
      const [source, target] = direction.split("-");

      if (!text) {
        document.getElementById("outputText").value = "";
        return;
      }

      document.getElementById("outputText").value = "Processing request...";

      try {
        const response = await fetch("https://libretranslate.com/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            q: text,
            source: source,
            target: target,
            format: "text"
          })
        });

        const data = await response.json();

        if (data.translatedText) {
          document.getElementById("outputText").value = data.translatedText;
        } else {
          document.getElementById("outputText").value = "Error: Unexpected server response.";
        }

      } catch (err) {
        document.getElementById("outputText").value = "Error: Unable to contact translation server.";
      }
    }
  </script>

</body>
</html>
