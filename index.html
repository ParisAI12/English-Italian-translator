<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>English ↔ Italian Translator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      margin-top: 40px;
      padding: 25px;
      border-radius: 10px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-top: 0;
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-weight: bold;
    }
    button:hover {
      background: #1d4ed8;
    }
    #output {
      background: #f9fafb;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 6px;
      min-height: 80px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>English ↔ Italian Translator</h1>

    <label for="direction">Translation Direction</label>
    <select id="direction">
      <option value="en-it">English → Italian</option>
      <option value="it-en">Italian → English</option>
    </select>

    <label for="inputText">Enter Text</label>
    <textarea id="inputText" placeholder="Type something..."></textarea>

    <button onclick="translateText()">Translate</button>

    <label>Translation</label>
    <div id="output"></div>
  </div>

  <script>
    async function translateText() {
      const text = document.getElementById("inputText").value.trim();
      const direction = document.getElementById("direction").value;
      const [source, target] = direction.split("-");

      if (!text) {
        document.getElementById("output").textContent = "";
        return;
      }

      document.getElementById("output").textContent = "Translating...";

      try {
        const response = await fetch("https://libretranslate.com/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            q: text,
            source: source,
            target: target,
            format: "text"
          })
        });

        const data = await response.json();
        document.getElementById("output").textContent = data.translatedText;
      } catch (error) {
        document.getElementById("output").textContent =
          "Error: Could not reach translation server.";
      }
    }
  </script>

</body>
</html>
